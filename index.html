<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DroneFarm</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="stat">
    <h2>DINHEIRO</h2>
    <p id="money">100</p>
  </div>

  <div class="stat">
    <h2>COMIDA</h2>
    <p id="food">0</p>
  </div>

  <div class="stat">
    <h2>EFICIÊNCIA</h2>
    <p id="efficiency">0%</p>
  </div>
</header>

<div class="container">

  <aside class="sidebar">

    <h1>🚁 DroneFarm</h1>

    <div class="drone-card">
      <h3>🌱 Drone Plantador</h3>
      <p>Planta sementes automaticamente.</p>

      <button onclick="buyDrone('planter')">
        Comprar ($50)
      </button>

      <span>
        Quantidade:
        <span id="planterCount">0</span>
      </span>
    </div>

    <div class="drone-card">
      <h3>💧 Drone Irrigador</h3>
      <p>Acelera crescimento.</p>

      <button onclick="buyDrone('water')">
        Comprar ($75)
      </button>

      <span>
        Quantidade:
        <span id="waterCount">0</span>
      </span>
    </div>

    <div class="drone-card">
      <h3>☠️ Drone AgroTóxico</h3>
      <p>Protege as plantações.</p>

      <button onclick="buyDrone('pesticide')">
        Comprar ($120)
      </button>

      <span>
        Quantidade:
        <span id="pesticideCount">0</span>
      </span>
    </div>

    <div class="drone-card">
      <h3>📦 Drone Coletor</h3>
      <p>Colhe automaticamente.</p>

      <button onclick="buyDrone('collector')">
        Comprar ($100)
      </button>

      <span>
        Quantidade:
        <span id="collectorCount">0</span>
      </span>
    </div>

    <div class="log" id="log"></div>

  </aside>

  <main class="game">
    <div class="grid" id="grid"></div>
  </main>

</div>

<script src="script.js"></script>

</body>
</html>
