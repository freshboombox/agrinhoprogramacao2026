<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazenda de Drones Industrial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Fazenda de Drones Industrial</h1>
  <div class="game-container">
    <div class="panel">
      <div class="stats-panel">
        <div class="stat-box money-box">Dinheiro: $<span id="money">100</span></div>
        <div class="stat-box">Alimento: <span id="food">0</span></div>
        <div class="stat-box">Pontuação: <span id="farmScore">0</span></div>
        <div class="stat-box">Drones Totais: <span id="droneTotal">4</span></div>
        <div class="stat-box">Produção/min: <span id="productionRate">0</span></div>
        <div class="stat-box weather-box">Clima: <span id="weather">Calmo</span></div>
        <div class="stat-box">Tamanho: <span id="gridSize">8x8</span></div>
      </div>
      <div class="actions-panel">
        <button class="btn" data-buy="planter">🌱 Comprar Planter ($50)</button>
        <button class="btn" data-buy="water">💧 Comprar Water ($75)</button>
        <button class="btn" data-buy="pesticide">☠️ Comprar Pesticide ($110)</button>
        <button class="btn" data-buy="collector">📦 Comprar Collector ($95)</button>
        <button id="upgradeSpeed" class="btn">⚡ Upgrade Velocidade ($140)</button>
        <button id="upgradeBattery" class="btn">🔋 Upgrade Bateria ($160)</button>
        <button id="upgradeLuck" class="btn">🍀 Upgrade Sorte ($180)</button>
        <button id="expandFarm" class="btn">🗺️ Expandir Fazenda (<span id="expandPrice">$200</span>)</button>
        <button id="placeCharger" class="btn">🔌 Estação de Recarga ($120)</button>
        <button id="removeCharger" class="btn">❌ Remover Estação</button>
        <button id="placeRefinery" class="btn">⚙️ Criar Refinaria ($150)</button>
        <button id="removeRefinery" class="btn">🔥 Remover Refinaria</button>
      </div>
      <div class="drone-counts">
        <div class="counter-item">Planters: <strong id="count-planter">1</strong></div>
        <div class="counter-item">Waters: <strong id="count-water">1</strong></div>
        <div class="counter-item">Pesticides: <strong id="count-pesticide">1</strong></div>
        <div class="counter-item">Collectors: <strong id="count-collector">1</strong></div>
        <div class="counter-item">Carregadores: <strong id="count-charger">0</strong></div>
        <div class="counter-item">Fábricas Ativas: <strong id="count-refinery">0</strong></div>
      </div>
    </div>
    <div class="panel">
      <div class="farm-wrapper">
        <div id="farm"></div>
        <div id="dronesLayer"></div>
      </div>
      <div id="log" class="log-panel"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
